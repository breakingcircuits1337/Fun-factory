model_list:
  - model_name: "claude-sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: "claude-haiku"
    litellm_params:
      model: "anthropic/claude-haiku-4-5-20251001"
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: "gpt-4o"
    litellm_params:
      model: "openai/gpt-4o"
      api_key: "os.environ/OPENAI_API_KEY"
  - model_name: "local-llm"
    litellm_params:
      model: "ollama/codellama:70b"
      api_base: "http://localhost:11434"

router_settings:
  routing_strategy: "usage-based-routing"
  fallbacks:
    - "claude-sonnet":
        - "gpt-4o"
        - "local-llm"
  num_retries: 3
  timeout: 120

litellm_settings:
  drop_params: true
  success_callback: []
  failure_callback: []
  cache: true
  cache_params:
    type: "redis"
    host: "redis"
    port: 6379
  # Per-task budget enforcement via virtual keys
  default_team_settings:
    - team_id: "default"
      max_budget: 10.0
      budget_duration: "1d"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
  store_model_in_db: true   # required for virtual key management
