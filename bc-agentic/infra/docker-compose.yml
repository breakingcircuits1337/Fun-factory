version: "3.9"

services:
  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bcagentic
      POSTGRES_USER: bcagent
      POSTGRES_PASSWORD: bcagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ChromaDB ────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  # ── Langfuse Observability ───────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://bcagent:bcagent@postgres:5432/bcagentic
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-change-me-langfuse-secret}
      SALT: ${LANGFUSE_SALT:-change-me-langfuse-salt}
    depends_on:
      postgres:
        condition: service_healthy

  # ── LiteLLM Proxy ───────────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ../litellm/litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "4"]
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── FastAPI Orchestrator ─────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://bcagent:bcagent@postgres:5432/bcagentic
      LANGGRAPH_CHECKPOINTER_URL: postgresql://bcagent:bcagent@postgres:5432/bcagentic
      REDIS_URL: redis://redis:6379/0
      LITELLM_BASE_URL: http://litellm:4000
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/tmp/bc-agent-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    command: ["celery", "-A", "api.worker.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://bcagent:bcagent@postgres:5432/bcagentic
      LANGGRAPH_CHECKPOINTER_URL: postgresql://bcagent:bcagent@postgres:5432/bcagentic
      REDIS_URL: redis://redis:6379/0
      LITELLM_BASE_URL: http://litellm:4000
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/tmp/bc-agent-workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React UI ─────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ../ui
      dockerfile: ../infra/Dockerfile.ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  chroma_data:
  workspaces:
