server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /tasks {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /repos {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /webhooks {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:8000;
    }
}
